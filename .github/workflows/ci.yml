name: InsightCloud CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test database initialization
        run: python -c "from database import init_db; init_db(); print('DB OK')"

      - name: Test authentication module
        run: python -c "from auth import hash_password, verify_password; h = hash_password('test'); assert verify_password('test', h); print('Auth OK')"

      - name: Test pandas import
        run: python -c "import pandas as pd; print('Pandas OK')"

      - name: Test GenAI module import
        run: python -c "from genai import build_context; print('GenAI module OK')"

      - name: Test boto3 import
        run: python -c "import boto3; print('Boto3 OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t insightcloud:latest .

      - name: Confirm build success
        run: echo "Docker build successful"
